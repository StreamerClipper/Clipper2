name: Clipper — process hype moment

on:
  push:
    branches:
      - main
    paths:
      - "output/pending_moments.jsonl"

jobs:
  clip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v2
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg

      - name: Install fonts
        run: |
          mkdir -p ~/.local/share/fonts
          cp fonts/LuckiestGuy-Regular.ttf ~/.local/share/fonts/
          fc-cache -fv
      
      - name: Install yt-dlp
        run: |
          sudo curl -sSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp

      - name: Install Python dependencies
        run: pip install faster-whisper python-dotenv anthropic aiohttp streamlink requests google-auth google-auth-oauthlib google-api-python-client

      - name: Run Clipper
        env:
          CLIP_PADDING_BEFORE: "50"
          CLIP_PADDING_AFTER: "10"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STREAMER_CONFIG: ${{ secrets.STREAMER_CONFIG }}
        run: python -m agents.clipper

      - name: Run Publisher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: python -m agents.publisher
        continue-on-error: true

      - name: Commit processed moments + clip
        run: |
          git config user.name  "clipbot"
          git config user.email "clipbot@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "[clipper] clip processed"
          git pull origin main --rebase --strategy-option=ours
          git push origin main
